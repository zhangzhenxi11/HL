<!DOCTYPE html>
<html lang="en" style="height: 100%">
<head>
    <meta charset="utf-8">
</head>
<body style="height: 100%; margin: 0">
    <div id="container" style="height: 100%"></div>

    <script src="./echarts.js"></script>
    <script type="text/javascript">
        var myChart = null;

        function initChart() {
            var dom = document.getElementById('container');
            if (!dom) return;

            // Wait for non-zero size
            if (dom.clientWidth === 0 || dom.clientHeight === 0) {
                setTimeout(initChart, 100);
                return;
            }

            if (myChart != null) {
                myChart.dispose();
            }

            myChart = echarts.init(dom, null, {
                renderer: 'canvas',
                useDirtyRect: false
            });

            var option = {
                title: {
                    text: 'Stacked Line'
                },
                tooltip: {
                    trigger: 'axis'
                },
                dataZoom: [
                    {
                        show: true,
                        type: 'slider',
                        handleSize: 32,
                        startValue: 0,
                        endValue: 10
                    },
                    {
                        type: 'inside'
                    }
                ],
                legend: {
                    data: []
                },
                grid: {
                    left: '3%',
                    right: '4%',
                    bottom: '3%',
                    containLabel: true
                },
                toolbox: {
                    feature: {
                        saveAsImage: {}
                    }
                },
                xAxis: {
                    type: 'category',
                    boundaryGap: false,
                    data: []
                },
                yAxis: {
                    type: 'value'
                },
                series: []
            };

            myChart.setOption(option);
            window.addEventListener('resize', function () { if (myChart) myChart.resize(); });
        }

        // Initialize when window loads
        window.onload = initChart;

        // Listen for postMessage from host to update chart in renderer context
        window.addEventListener('message', function(event) {
            try {
                var payload = event.data;
                if (!payload || payload.type !== 'data_update') return;
                var timestamps = payload.timestamps || [];
                var legends = payload.legends || [];
                var seriesArray = payload.series || [];

                // Normalize series
                var normalized = seriesArray.map(function(s, idx) {
                    var obj = { name: 'Series' + (idx+1), type: 'line', smooth: true, data: [] };
                    if (s && Array.isArray(s.data)) {
                        obj.data = s.data;
                    } else if (Array.isArray(s)) {
                        obj.data = s;
                    }
                    if (s && s.name) obj.name = s.name;
                    if (legends && legends[idx]) obj.name = legends[idx];
                    return obj;
                });

                var option = {
                    legend: { data: legends },
                    xAxis: { data: timestamps },
                    series: normalized
                };

                // Update chart now in page (renderer) context
                if (myChart) {
                    myChart.setOption(option, true);
                } else {
                    console.warn('postMessage: chart not initialized yet');
                }

            } catch (e) {
                console.error('postMessage handler error:', e);
            }
        }, false);

        // 保留旧的 onDataReceived 接口，作为兼容
        function onDataReceived(timestamps, legends, seriesArray) {
            try {
                if (!myChart) {
                    console.warn('onDataReceived: chart not initialized yet');
                    return;
                }
                // 延迟 setOption 保持兼容
                setTimeout(function() {
                    try {
                        var pointCount = Array.isArray(timestamps) ? timestamps.length : 0;
                        var seriesInput = Array.isArray(seriesArray) ? seriesArray : [];
                        var normalized = seriesInput.map(function (s, idx) {
                            var obj = { name: 'Series' + (idx + 1), type: 'line', smooth: true, data: [] };
                            if (Array.isArray(s)) obj.data = s.slice(0, pointCount);
                            else if (s && Array.isArray(s.data)) obj.data = s.data.slice(0, pointCount);
                            if (s && s.name) obj.name = s.name;
                            if (legends && legends[idx]) obj.name = legends[idx];
                            return obj;
                        });

                        var option = {
                            legend: { data: legends || [] },
                            xAxis: { data: timestamps || [] },
                            series: normalized
                        };
                        myChart.setOption(option, true);
                    } catch (ex) {
                        console.error('deferred onDataReceived error:', ex);
                    }
                }, 0);
            } catch (e) {
                console.error('onDataReceived error:', e);
            }
        }
    </script>
</body>
</html>
