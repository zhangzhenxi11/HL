
<!DOCTYPE html>
<html lang="en" style="height: 100%">
<head>
  <meta charset="utf-8">
</head>
<body style="height: 100%; margin: 0">
  <div id="container" style="height: 100%"></div>

  <script src="./echarts.js"></script>
  <script type="text/javascript">
    var myChart = null;
    
    function initChart() {
        var dom = document.getElementById('container');
        if (!dom) return;
        
        // Wait for non-zero size
        if (dom.clientWidth === 0 || dom.clientHeight === 0) {
            setTimeout(initChart, 100);
            return;
        }
        
        if (myChart != null) {
            myChart.dispose();
        }
        
        myChart = echarts.init(dom, null, {
          renderer: 'canvas',
          useDirtyRect: false
        });
        
        var option = {
          title: {
            text: 'Stacked Line'
          },
          tooltip: {
            trigger: 'axis'
          },
           dataZoom: [
              {
                show: true,
                type: 'slider',
                handleSize: 32,
                startValue: 0,
                endValue: 10
              },
              {
                type: 'inside'
              }
           ],
          legend: {
            data: []
          },
          grid: {
            left: '3%',
            right: '4%',
            bottom: '3%',
            containLabel: true
          },
          toolbox: {
            feature: {
              saveAsImage: {}
            }
          },
          xAxis: {
            type: 'category',
            boundaryGap: false,
            data: []
          },
          yAxis: {
            type: 'value'
          },
          series: []
        };
        
        myChart.setOption(option);
        window.addEventListener('resize', myChart.resize);
    }

    // Initialize when window loads
    window.onload = initChart;
    
	//数据接收函数，原理就是需要改变数据的地方，重置那部分数据就可以
     function onDataReceived(name, legendNames, datalen) {
         if (!myChart) return;
         
         var option = {
             xAxis: {
                 data: name,
				 interval: 3000,
				 splitLine: {
				     show: false
				 }
             },
             legend: {
                 data: legendNames
             },
			 series:datalen
         };
         myChart.setOption(option)
     }
  </script>
</body>
</html>
