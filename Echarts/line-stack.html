
<!DOCTYPE html>
<html lang="en" style="height: 100%">
<head>
  <meta charset="utf-8">
</head>
<body style="height: 100%; margin: 0">
  <div id="container" style="height: 100%"></div>

  <script src="./echarts.js"></script>
  <script type="text/javascript">
    var dom = document.getElementById('container');
    var myChart = echarts.init(dom, null, {
      renderer: 'canvas',
      useDirtyRect: false
    });
    var app = {};
    
    var option;
	
	option = {
	  title: {
		text: 'Stacked Line'
	  },
	  tooltip: {
		trigger: 'axis'
	  },
	  legend: {
		data: []
	  },
	  grid: {
		left: '3%',
		right: '4%',
		bottom: '3%',
		containLabel: true
	  },
	  toolbox: {
		feature: {
		  saveAsImage: {}
		}
	  },
	  xAxis: {
		type: 'category',
		boundaryGap: false,
		data: []
	  },
	  yAxis: {
		type: 'value'
	  },
	  series: [
		
	  ]
	};
	
	//数据接收函数，原理就是需要改变数据的地方，重置那部分数据就可以
     function onDataReceived(name, legendNames, datalen) {
         var option = {
             title: {
                 text: 'Stacked Line'
             },
             tooltip: {
                 trigger: 'axis'
             },
             grid: {
                 left: '3%',
                 right: '4%',
                 bottom: '3%',
                 containLabel: true
             },
             xAxis: {
                 data: name,
				 interval: 3000,
				 splitLine: {
				     show: false
				 }
             },
             yAxis: {
                 type: 'value'
             },
             legend: {
                data: legendNames
             },
			 series:datalen
         };
         setTimeout(function() {
            myChart.setOption(option, true);
         }, 0);
     }
         
      // myChart.setOption(option);
      window.addEventListener('resize', myChart.resize);
   
  </script>
</body>
</html>
